<style>
  :root {
    --accent: #c95917;
    --accent-glow: rgba(201,89,23,0.35);
    --accent-dim: rgba(201,89,23,0.12);
    --bg: #0a0a0c;
    --bg2: #111115;
    --card: #18181e;
    --card2: #1f1f27;
    --border: rgba(255,255,255,0.07);
    --text: #f0eeea;
    --text2: #8a8a95;
    --text3: #55555f;
    --radius: 20px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(80px + var(--safe-bottom));
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    padding: calc(var(--safe-top) + 16px) 20px 0;
    background: linear-gradient(180deg, var(--bg2) 0%, transparent 100%);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }
  .logo span { color: var(--accent); }
  .streak-badge {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 12px 20px 0;
    background: var(--bg2);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .tab {
    flex: 1;
    padding: 10px 0;
    border: none;
    background: transparent;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    transition: all 0.25s ease;
    cursor: pointer;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── PAGES ── */
  .page { display: none; padding: 20px; animation: fadeUp 0.3s ease; }
  .page.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1.5px;
    color: var(--text2);
    margin-bottom: 14px;
  }

  /* ── STATS BAR ── */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }
  .stat-tile {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 12px;
    text-align: center;
    animation: fadeUp 0.4s ease both;
  }
  .stat-tile:nth-child(1) { animation-delay: 0.05s; }
  .stat-tile:nth-child(2) { animation-delay: 0.10s; }
  .stat-tile:nth-child(3) { animation-delay: 0.15s; }
  .stat-tile .val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    line-height: 1;
  }
  .stat-tile .lbl {
    font-size: 10px;
    font-weight: 500;
    color: var(--text3);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── FORM CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeUp 0.35s ease both;
  }
  .card:nth-child(2) { animation-delay: 0.07s; }
  .card:nth-child(3) { animation-delay: 0.14s; }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1.5px;
    color: var(--text2);
    margin-bottom: 16px;
  }

  .field { margin-bottom: 14px; }
  label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text3);
    display: block;
    margin-bottom: 6px;
  }
  input[type=text], input[type=date], input[type=number], textarea {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  textarea { min-height: 80px; resize: vertical; }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.3); }

  /* ── GRID INPUTS ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ── RANGE SLIDER ── */
  .range-wrap { position: relative; }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--card2);
    border-radius: 4px;
    border: none;
    padding: 0;
    margin-top: 4px;
    box-shadow: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    cursor: pointer;
    transition: transform 0.15s;
  }
  input[type=range]:active::-webkit-slider-thumb { transform: scale(1.3); }
  .range-val {
    text-align: right;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
    margin-top: 2px;
  }

  /* ── BUTTON ── */
  .btn-primary {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: var(--accent);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    box-shadow: 0 4px 20px var(--accent-glow);
    margin-top: 4px;
  }
  .btn-primary:active { transform: scale(0.97); background: #a8450f; }

  /* ── RECORDS ── */
  .records-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }
  .rec-tile {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  .rec-tile::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.6s ease;
  }
  .rec-tile.loaded::before { transform: scaleX(1); }
  .rec-tile .icon { font-size: 22px; margin-bottom: 6px; }
  .rec-tile .r-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--text);
    line-height: 1;
  }
  .rec-tile .r-lbl {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .rec-tile .r-unit {
    font-size: 14px;
    color: var(--text2);
    font-weight: 300;
  }

  /* ── HISTORY ENTRIES ── */
  .entry {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
    transition: transform 0.2s;
  }
  .entry:active { transform: scale(0.99); }
  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .entry-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--text);
  }
  .entry-forme {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    padding: 3px 9px;
    border-radius: 20px;
  }
  .entry-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .pill {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
  }
  .pill .p-val { color: var(--text); font-weight: 600; }
  .entry-course {
    font-size: 13px;
    color: var(--text2);
    font-style: italic;
    margin-bottom: 6px;
  }
  .entry-notes {
    font-size: 12px;
    color: var(--text3);
    border-top: 1px solid var(--border);
    padding-top: 8px;
    margin-top: 4px;
  }
  .btn-del {
    background: rgba(255,59,48,0.1);
    border: 1px solid rgba(255,59,48,0.3);
    color: #ff3b30;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .btn-del:active { background: rgba(255,59,48,0.25); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
  }
  .empty .big { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: calc(90px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 30px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 100;
    white-space: nowrap;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 0; }

  /* ── PROGRAMME ── */
  .semaine-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .sem-btn {
    flex: 1;
    padding: 12px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text3);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sem-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .jour-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 10px;
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }
  .jour-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .jour-nom {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--text);
  }
  .jour-tag {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 8px;
  }
  .jour-tag.repos { background: rgba(255,255,255,0.05); color: var(--text3); }
  .jour-tag.cardio { background: rgba(52,199,89,0.12); color: #34c759; border: 1px solid rgba(52,199,89,0.3); }
  .jour-tag.renfo { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(201,89,23,0.3); }
  .jour-tag.eps { background: rgba(90,120,255,0.12); color: #7b96ff; border: 1px solid rgba(90,120,255,0.3); }
  .jour-chevron {
    color: var(--text3);
    font-size: 12px;
    transition: transform 0.25s;
    margin-left: 8px;
  }
  .jour-card.open .jour-chevron { transform: rotate(180deg); }
  .jour-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .jour-card.open .jour-body { max-height: 400px; }
  .jour-content {
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }
  .exo-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    color: var(--text2);
    line-height: 1.4;
  }
  .exo-item:last-child { border-bottom: none; }
  .exo-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 5px;
    flex-shrink: 0;
  }
  .exo-dot.green { background: #34c759; }
  .exo-dot.gray { background: var(--text3); }

</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">SUIVI <span>SPORT</span></div>
    <div class="streak-badge" id="streakBadge">0 SÉANCES</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('saisie',this)">✦ Séance</button>
    <button class="tab" onclick="switchTab('records',this)">🏆 Records</button>
    <button class="tab" onclick="switchTab('historique',this)">📅 Historique</button>
    <button class="tab" onclick="switchTab('programme',this)">📋 Programme</button>
  </div>
</div>

<!-- PAGE SAISIE -->
<div id="page-saisie" class="page active">
  <div class="card">
    <div class="card-title">Informations</div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="date">
    </div>
    <div class="field">
      <label>Course / Cardio</label>
      <input type="text" id="course" placeholder="ex: 25 min à 5:32/km">
    </div>
    <div class="field">
      <label>Sommeil</label>
      <input type="number" id="sommeil" step="0.5" min="0" max="24" placeholder="heures">
    </div>
  </div>

  <div class="card">
    <div class="card-title">Exercices</div>
    <div class="grid-2">
      <div class="field">
        <label>Gainage (s)</label>
        <input type="number" id="gainage" placeholder="0" min="0">
      </div>
      <div class="field">
        <label>Pompes</label>
        <input type="number" id="pompes" placeholder="0" min="0">
      </div>
      <div class="field">
        <label>Squats</label>
        <input type="number" id="squats" placeholder="0" min="0">
      </div>
      <div class="field">
        <label>Abdos</label>
        <input type="number" id="abdos" placeholder="0" min="0">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Ressenti</div>
    <div class="field">
      <label>Forme du jour — <span id="formeLabel">5</span>/10</label>
      <div class="range-wrap">
        <input type="range" id="forme" min="1" max="10" value="5"
          oninput="document.getElementById('formeLabel').textContent=this.value">
      </div>
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="notes" placeholder="Observations, sensations…"></textarea>
    </div>
    <button class="btn-primary" onclick="ajouter()">ENREGISTRER LA SÉANCE</button>
  </div>
</div>

<!-- PAGE RECORDS -->
<div id="page-records" class="page">
  <div class="section-title">Records personnels</div>
  <div class="records-grid" id="recordsGrid"></div>
  <div class="section-title">Moyennes</div>
  <div class="stats-row" id="statsRow"></div>
</div>

<!-- PAGE HISTORIQUE -->
<div id="page-historique" class="page">
  <div class="section-title">Toutes les séances</div>
  <div id="historiqueList"></div>
</div>

<!-- PAGE PROGRAMME -->
<div id="page-programme" class="page">
  <div class="semaine-toggle">
    <button class="sem-btn active" onclick="switchSemaine('A',this)">SEMAINE A</button>
    <button class="sem-btn" onclick="switchSemaine('B',this)">SEMAINE B</button>
  </div>
  <div id="programmeList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let donnees = JSON.parse(localStorage.getItem("sportData_v2")) || [];

// Init date
document.getElementById("date").value = new Date().toISOString().split("T")[0];

function save() {
  localStorage.setItem("sportData_v2", JSON.stringify(donnees));
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2400);
}

function switchTab(id, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("page-" + id).classList.add("active");
  if (id === "records") renderRecords();
  if (id === "historique") renderHistorique();
}

function ajouter() {
  const d = {
    date: document.getElementById("date").value,
    course: document.getElementById("course").value.trim(),
    gainage: Number(document.getElementById("gainage").value) || 0,
    pompes: Number(document.getElementById("pompes").value) || 0,
    squats: Number(document.getElementById("squats").value) || 0,
    abdos: Number(document.getElementById("abdos").value) || 0,
    sommeil: Number(document.getElementById("sommeil").value) || 0,
    forme: Number(document.getElementById("forme").value) || 5,
    notes: document.getElementById("notes").value.trim()
  };
  if (!d.date) { showToast("⚠️ Choisis une date !"); return; }
  donnees.unshift(d);
  save();
  updateStreak();
  // reset
  ["course","gainage","pompes","squats","abdos","sommeil","notes"].forEach(id => {
    document.getElementById(id).value = "";
  });
  document.getElementById("forme").value = 5;
  document.getElementById("formeLabel").textContent = "5";
  showToast("✓ Séance enregistrée !");
}

function supprimer(i) {
  if (!confirm("Supprimer cette séance ?")) return;
  donnees.splice(i, 1);
  save();
  updateStreak();
  renderHistorique();
  showToast("Séance supprimée");
}

function updateStreak() {
  document.getElementById("streakBadge").textContent = donnees.length + " SÉANCE" + (donnees.length > 1 ? "S" : "");
}

function renderRecords() {
  const grid = document.getElementById("recordsGrid");
  const stats = document.getElementById("statsRow");
  if (!donnees.length) {
    grid.innerHTML = '<div class="empty"><div class="big">🏆</div><p>Aucune séance<br>pour l\'instant</p></div>';
    stats.innerHTML = "";
    return;
  }
  let maxP = 0, maxS = 0, maxG = 0, maxA = 0;
  let totForme = 0, totSommeil = 0, n = donnees.length;
  donnees.forEach(d => {
    maxP = Math.max(maxP, d.pompes);
    maxS = Math.max(maxS, d.squats);
    maxG = Math.max(maxG, d.gainage);
    maxA = Math.max(maxA, d.abdos);
    totForme += d.forme;
    totSommeil += d.sommeil;
  });
  const recs = [
    { icon:"💪", val: maxP, lbl:"Pompes", unit:"reps" },
    { icon:"🦵", val: maxS, lbl:"Squats", unit:"reps" },
    { icon:"⏱️", val: maxG, lbl:"Gainage", unit:"sec" },
    { icon:"🔥", val: maxA, lbl:"Abdos", unit:"reps" }
  ];
  grid.innerHTML = recs.map((r,i) => `
    <div class="rec-tile" style="animation-delay:${i*0.06}s">
      <div class="icon">${r.icon}</div>
      <div class="r-val">${r.val} <span class="r-unit">${r.unit}</span></div>
      <div class="r-lbl">${r.lbl}</div>
    </div>
  `).join("");
  setTimeout(() => {
    document.querySelectorAll(".rec-tile").forEach(t => t.classList.add("loaded"));
  }, 100);
  stats.innerHTML = `
    <div class="stat-tile"><div class="val">${n}</div><div class="lbl">Séances</div></div>
    <div class="stat-tile"><div class="val">${(totForme/n).toFixed(1)}</div><div class="lbl">Forme moy.</div></div>
    <div class="stat-tile"><div class="val">${(totSommeil/n).toFixed(1)}h</div><div class="lbl">Sommeil moy.</div></div>
  `;
}

function renderHistorique() {
  const list = document.getElementById("historiqueList");
  if (!donnees.length) {
    list.innerHTML = '<div class="empty"><div class="big">📅</div><p>Aucune séance<br>enregistrée</p></div>';
    return;
  }
  list.innerHTML = donnees.map((d, i) => {
    const pills = [
      d.pompes  ? `<span class="pill">💪 <span class="p-val">${d.pompes}</span> pompes</span>` : "",
      d.squats  ? `<span class="pill">🦵 <span class="p-val">${d.squats}</span> squats</span>` : "",
      d.gainage ? `<span class="pill">⏱️ <span class="p-val">${d.gainage}s</span> gainage</span>` : "",
      d.abdos   ? `<span class="pill">🔥 <span class="p-val">${d.abdos}</span> abdos</span>` : "",
      d.sommeil ? `<span class="pill">😴 <span class="p-val">${d.sommeil}h</span></span>` : "",
    ].filter(Boolean).join("");
    return `
      <div class="entry" style="animation-delay:${Math.min(i*0.05,0.3)}s">
        <div class="entry-header">
          <div class="entry-date">${formatDate(d.date)}</div>
          ${d.forme ? `<div class="entry-forme">FORME ${d.forme}/10</div>` : ""}
        </div>
        ${d.course ? `<div class="entry-course">🏃 ${d.course}</div>` : ""}
        ${pills ? `<div class="entry-pills">${pills}</div>` : ""}
        ${d.notes ? `<div class="entry-notes">📝 ${d.notes}</div>` : ""}
        <button class="btn-del" onclick="supprimer(${i})">Supprimer</button>
      </div>
    `;
  }).join("");
}

function formatDate(str) {
  if (!str) return "—";
  const [y,m,d] = str.split("-");
  const months = ["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

// ── PROGRAMME ──
const PROGRAMME = {
  A: [
    { nom:"Lundi", tag:"renfo", exos:[
      {t:"💪 Pompes genoux : 3 × max"},
      {t:"⏱️ Gainage : 3 × 30 s"},
      {t:"🦵 Squats : 3 × 15"},
      {t:"🔥 Crunchs : 2 × 15"}
    ]},
    { nom:"Mardi", tag:"cardio", exos:[
      {t:"🏃 Course : 20 à 25 min à allure confortable", dot:"green"},
      {t:"🧘 Étirements : 5 min", dot:"green"}
    ]},
    { nom:"Mercredi", tag:"eps", label:"EPS 8h–10h", exos:[
      {t:"— Pas de séance", dot:"gray"},
      {t:"🧘 Étirements : 5 à 10 min", dot:"gray"}
    ]},
    { nom:"Jeudi", tag:"renfo", exos:[
      {t:"💪 Pompes genoux : 3 × max"},
      {t:"⏱️ Gainage : 3 × 30 s"},
      {t:"🪑 Chaise : 3 × max"},
      {t:"🔥 Crunchs : 2 × 15"}
    ]},
    { nom:"Vendredi", tag:"cardio", exos:[
      {t:"🏃 Course : 20 à 25 min", dot:"green"},
      {t:"🧘 Étirements : 5 min", dot:"green"}
    ]},
    { nom:"Samedi", tag:"renfo", exos:[
      {t:"🦵 Squats : 3 × 20"},
      {t:"💪 Pompes genoux : 3 × max"},
      {t:"⏱️ Gainage : 3 × max"},
      {t:"🪑 Chaise : 3 × max"}
    ]},
    { nom:"Dimanche", tag:"repos", exos:[
      {t:"— Repos", dot:"gray"},
      {t:"🚶 Marche ou étirements légers", dot:"gray"}
    ]}
  ],
  B: [
    { nom:"Lundi", tag:"renfo", exos:[
      {t:"💪 Pompes genoux : 3 × max"},
      {t:"⏱️ Gainage : 3 × 30 s"},
      {t:"🦵 Squats : 3 × 15"},
      {t:"🔥 Crunchs : 2 × 15"}
    ]},
    { nom:"Mardi", tag:"cardio", exos:[
      {t:"🏃 Course : 20 à 25 min", dot:"green"},
      {t:"🧘 Étirements : 5 min", dot:"green"}
    ]},
    { nom:"Mercredi", tag:"eps", label:"EPS 8h–10h", exos:[
      {t:"— Pas de séance", dot:"gray"},
      {t:"🧘 Étirements : 5 à 10 min", dot:"gray"}
    ]},
    { nom:"Jeudi", tag:"eps", label:"EPS 14h–16h", exos:[
      {t:"— Pas de séance de renforcement", dot:"gray"},
      {t:"🧘 Étirements : 5 à 10 min", dot:"gray"}
    ]},
    { nom:"Vendredi", tag:"renfo", exos:[
      {t:"💪 Pompes genoux : 4 × max"},
      {t:"⏱️ Gainage : 3 × 30 s"},
      {t:"🪑 Chaise : 3 × max"}
    ]},
    { nom:"Samedi", tag:"cardio", exos:[
      {t:"🏃 Course : 20 à 30 min", dot:"green"},
      {t:"🧘 Étirements : 5 min", dot:"green"}
    ]},
    { nom:"Dimanche", tag:"repos", exos:[
      {t:"— Repos", dot:"gray"}
    ]}
  ]
};

let semaineActive = "A";

function switchSemaine(s, btn) {
  semaineActive = s;
  document.querySelectorAll(".sem-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderProgramme();
}

function toggleJour(card) {
  card.classList.toggle("open");
}

function renderProgramme() {
  const today = new Date().getDay();
  const jourIndex = [6,0,1,2,3,4,5];
  const list = document.getElementById("programmeList");
  const jours = PROGRAMME[semaineActive];
  list.innerHTML = jours.map((j, i) => {
    const isToday = jourIndex[today] === i;
    const tagLabel = j.tag === "eps" ? j.label : {renfo:"Renfo",cardio:"Cardio",repos:"Repos"}[j.tag];
    const exosHtml = j.exos.map(e => `
      <div class="exo-item">
        <div class="exo-dot ${e.dot||""}"></div>
        <span>${e.t}</span>
      </div>
    `).join("");
    return `
      <div class="jour-card ${isToday ? "open" : ""}" style="animation-delay:${i*0.05}s" onclick="toggleJour(this)">
        <div class="jour-header">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="jour-nom">${isToday ? "▶ " : ""}${j.nom}</div>
            <span class="jour-tag ${j.tag}">${tagLabel}</span>
          </div>
          <span class="jour-chevron">▼</span>
        </div>
        <div class="jour-body">
          <div class="jour-content">${exosHtml}</div>
        </div>
      </div>
    `;
  }).join("");
}

updateStreak();
renderProgramme();
</script>
</body>
</html>
